<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이디어 자판기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root { font-family: "Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; }
  * { box-sizing: border-box; }
  body {
    font-family: "Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 40px 20px;
    color: #1d1d1f;
  }
  .wrap {
    max-width: 860px;
    position: relative;
    margin: 0 auto;
    background: #fff;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 30px rgba(0,0,0,0.06);
  }
  h1 { font-size: 23px; margin: 0 0 12px; letter-spacing: -0.5px; text-align: center; padding-bottom: 16px; border-bottom: 1px solid #e8e8ed; }
  p.lead { color: #6e6e73; font-size: 15px; margin: 0 0 8px; line-height: 1.6; text-align: center; }
  label { display: block; font-size: 15px; font-weight: 700; margin: 32px 0 10px; color: #1d1d1f; }
  .sublabel { font-size: 15px; color: #86868b; font-weight: 400; margin-left: 4px; }

  /* 도구모음 런처 */
  .da-launcher{position:absolute;top:16px;right:16px;z-index:50;display:inline-flex;align-items:center;gap:6px;height:29px;padding:0 9px;border:1.5px solid #e6e9ee;border-radius:7px;background:#fff;text-decoration:none;color:#1a1d21;font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:15px;font-weight:600;line-height:1;transition:.15s}
  .da-launcher:hover{border-color:#0071e3;box-shadow:0 4px 18px rgba(0,113,227,.12)}
  .da-launcher .da-gi{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:18px;height:18px}
  .da-launcher .da-gi i{background:#5b6470;border-radius:1px;transition:.15s}
  .da-launcher:hover .da-gi i{background:#0071e3}

  /* 토글 칩 */
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    flex: 1; min-width: 0; padding: 10px 8px; border: none; background: #f0f0f2; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 600; color: #1d1d1f;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    height: 40px; -webkit-tap-highlight-color: transparent;
  }
  .chip:hover:not(.active) { background: #e8e8ed; }
  .chip.active { background: #eaf4ff; color: #0071e3; }
  .chip .em { font-size: 15px; }
  .source-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .source-grid .chip { flex: none; }
  @media (max-width: 520px) { .source-grid { grid-template-columns: 1fr 1fr; } }

  /* 갯수 카운터 */
  .page-row { display: flex; gap: 8px; align-items: stretch; }
  .page-btn {
    width: 44px; height: 40px; border: none; background: #f0f0f2; color: #1d1d1f;
    font-weight: 700; font-size: 18px; cursor: pointer; font-family: inherit;
    border-radius: 8px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover { background: #e8e8ed; }
  .page-display {
    flex: 1; border: none; background: #eaf4ff; color: #0071e3; padding: 8px;
    text-align: center; font-size: 15px; font-weight: 700; border-radius: 8px;
    user-select: none; height: 40px; display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .page-display .unit { font-size: 15px; font-weight: 600; opacity: .75; }

  /* 처리 모드 */
  .mode-row { display: flex; gap: 8px; }
  .mode-card {
    flex: 1; padding: 10px 8px; border: none; background: #f0f0f2; border-radius: 8px;
    cursor: pointer; transition: all 0.15s; font-family: inherit; color: #1d1d1f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; line-height: 1.3; min-height: 52px;
  }
  .mode-card:hover:not(.active) { background: #e8e8ed; }
  .mode-card.active { background: #eaf4ff; }
  .mode-name { font-size: 15px; font-weight: 800; letter-spacing: 0.3px; }
  .mode-card.active .mode-name { color: #0071e3; }
  .mode-sub { font-size: 15px; color: #86868b; }

  /* 주제 입력 */
  .topic-input {
    width: 100%; margin-top: 8px; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px;
    font-size: 15px; font-family: inherit; background: #fff;
  }
  .hint { font-size: 15px; color: #86868b; margin-top: 6px; }

  /* 생성 버튼 */
  button.submit-btn {
    width: 100%; margin-top: 32px; padding: 16px; background: #0071e3; color: #fff;
    border: 0; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; position: relative; overflow: hidden; height: 52px;
    display: flex; align-items: center; justify-content: center;
  }
  button.submit-btn:hover:not(:disabled) { background: #0077ed; }
  button.submit-btn:disabled { background: #aacdef; cursor: not-allowed; }
  button.submit-btn:disabled::after {
    content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%);
    animation: skeleton-wave 2.5s infinite;
  }
  @keyframes skeleton-wave { 0% { left: -60%; } 100% { left: 110%; } }

  .status {
    margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 15px; line-height: 1.5;
    display: none; white-space: pre-wrap;
  }
  .status.info { background: #eaf4ff; color: #003c80; display: block; }
  .status.error { background: #ffeaea; color: #8a0000; display: block; }
  .status.success { background: #e7f7ed; color: #1a5b30; display: block; }

  /* 결과 */
  .results { margin-top: 28px; }
  .results-head {
    display: none; align-items: center; justify-content: space-between;
    padding-bottom: 12px; margin-bottom: 16px; border-bottom: 1px solid #e8e8ed;
  }
  .results-head.show { display: flex; }
  .results-head .rtitle { font-size: 15px; font-weight: 700; }
  .results-head .rmeta { font-size: 15px; color: #86868b; margin-top: 2px; }
  .head-actions { display: flex; gap: 6px; flex: none; }
  .copy-all {
    font-size: 13px; font-weight: 600; color: #0071e3; background: #eaf4ff;
    border: none; border-radius: 7px; padding: 5px 9px; cursor: pointer; font-family: inherit;
    white-space: nowrap; transition: .15s;
  }
  .copy-all:hover { background: #d8ecff; }

  /* 참고한 업로드 보고서 */
  .report-note { margin-bottom: 14px; }
  .report-note details { background:#f5f8ff; border:1px solid #dbe7fb; border-radius:10px; }
  .report-note summary { cursor:pointer; list-style:none; padding:10px 14px; font-size:15px; font-weight:700; color:#0071e3; }
  .report-note summary::-webkit-details-marker { display:none; }
  .report-note summary::after { content:" ▾"; color:#7aa7e6; }
  .report-note details[open] summary::after { content:" ▴"; }
  .report-note .rn-body { padding:0 14px 12px; }
  .report-note .rn-sub { font-size:15px; color:#6e6e73; margin:2px 0 8px; }
  .report-note .rn-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .report-note .rn-chips span { font-size:15px; color:#1d1d1f; background:#fff; border:1px solid #dbe7fb; border-radius:6px; padding:3px 8px; line-height:1.4; }
  .report-note .rn-note { font-size:15px; color:#a1a1a6; margin-top:8px; }
  .report-note .rn-fail { font-size:15px; color:#8a6d00; background:#fff8e6; border:1px solid #ffe6a3; border-radius:8px; padding:8px 12px; }

  .idea-card {
    border: 1px solid #e8e8ed; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
    background: #fff; opacity: 0; transform: translateY(8px); animation: dispense .4s ease forwards;
  }
  @keyframes dispense { to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .idea-card { animation: none; opacity: 1; transform: none; } }
  .idea-top { display: flex; align-items: flex-start; gap: 10px; padding-right: 132px; }
  .idea-num {
    flex: none; width: 24px; height: 24px; border-radius: 7px; background: #0071e3; color: #fff;
    font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .idea-title { font-size: 15px; font-weight: 700; line-height: 1.45; }
  .idea-tag {
    display: inline-block; font-size: 15px; font-weight: 700; color: #6e6e73; background: #f0f0f2;
    border-radius: 6px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; letter-spacing: .2px;
  }
  /* 4필드 — 내용 / 당사 기회 / 당사 위협 / 보고서 방향 */
  .idea-content { margin-top: 12px; }
  .idea-content .fl, .idea-ot .fl, .idea-angle .fl {
    font-size: 15px; font-weight: 800; letter-spacing: .3px; margin-bottom: 4px;
  }
  .idea-content .fl { color: #86868b; }
  .idea-content .ft { font-size: 15px; color: #3a3a3c; line-height: 1.6; }
  .idea-content .ft b, .idea-ot .ft b { color: #1d1d1f; font-weight: 700; }

  .idea-ot { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .idea-ot .otbox { border-radius: 10px; padding: 10px 12px; }
  .idea-ot .otbox .ft { font-size: 15px; line-height: 1.55; }
  .idea-ot .opp { background: #effaf3; border: 1px solid #cdeed9; }
  .idea-ot .opp .fl { color: #1a7a42; }
  .idea-ot .thr { background: #fff1f1; border: 1px solid #f6d6d6; }
  .idea-ot .thr .fl { color: #b02a2a; }
  @media (max-width: 520px) { .idea-ot { grid-template-columns: 1fr; } }

  .idea-angle {
    margin-top: 12px; background: #eef5ff; border: 1px solid #d6e6fb;
    border-left: 3px solid #0071e3; border-radius: 10px; padding: 11px 13px;
  }
  .idea-angle .fl { color: #0071e3; }
  .idea-angle .ft { font-size: 15px; color: #2b3a4d; line-height: 1.6; }
  .idea-angle .ft b { color: #003c80; font-weight: 700; }

  /* bullet 리스트 — 내용/기회/위협/방향 공통 (1~3개) */
  ul.bl { margin: 4px 0 0; padding: 0; list-style: none; }
  ul.bl li { position: relative; padding-left: 13px; line-height: 1.55; margin-bottom: 5px; }
  ul.bl li:last-child { margin-bottom: 0; }
  ul.bl li::before { content: ""; position: absolute; left: 1px; top: 8px; width: 5px; height: 5px; border-radius: 50%; }
  ul.bl li b { font-weight: 700; }
  .idea-content ul.bl { font-size: 15px; color: #3a3a3c; }
  .idea-content ul.bl li::before { background: #86868b; }
  .idea-content ul.bl li b { color: #1d1d1f; }
  .idea-ot .otbox ul.bl { font-size: 15px; }
  .idea-ot .opp ul.bl { color: #2a5e3e; }
  .idea-ot .opp ul.bl li::before { background: #1a7a42; }
  .idea-ot .opp ul.bl li b { color: #1a7a42; }
  .idea-ot .thr ul.bl { color: #7a3636; }
  .idea-ot .thr ul.bl li::before { background: #b02a2a; }
  .idea-ot .thr ul.bl li b { color: #b02a2a; }
  .idea-angle ul.bl { font-size: 15px; color: #2b3a4d; }
  .idea-angle ul.bl li::before { background: #0071e3; }
  .idea-angle ul.bl li b { color: #003c80; }

  .src-foot { margin-top: 12px; font-size: 15px; color: #a1a1a6; }
  .src-foot .pill { display:inline-block; background:#f5f5f7; border-radius:5px; padding:1px 7px; margin-right:4px; }
  .src-foot .pill-none { color:#b8b8be; font-style:italic; cursor:default; }

  /* 근거 출처 모달 */
  .src-pill { cursor: pointer; transition: all .12s; }
  .src-pill:hover { background: #e7f0ff; color: #0071e3; }
  .srcmodal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.32); display: none;
    align-items: center; justify-content: center; padding: 20px; z-index: 200;
  }
  .srcmodal-overlay.show { display: flex; }
  .srcmodal {
    background: #fff; border-radius: 16px; max-width: 440px; width: 100%;
    max-height: 78vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.22);
  }
  .srcmodal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid #e8e8ed; font-size: 15px; font-weight: 700; color: #1d1d1f;
  }
  .srcmodal-close {
    border: none; background: #f0f0f2; color: #6e6e73; width: 26px; height: 26px;
    border-radius: 7px; font-size: 17px; line-height: 1; cursor: pointer;
  }
  .srcmodal-close:hover { background: #e8e8ed; color: #1d1d1f; }
  .srcmodal-body { padding: 16px 18px; overflow-y: auto; font-size: 15px; color: #3a3a3c; line-height: 1.6; }
  .srcmodal-list { margin: 0; padding-left: 0; list-style: none; }
  .srcmodal-list li {
    padding: 9px 0 9px 16px; border-bottom: 1px solid #f2f2f4; position: relative;
  }
  .srcmodal-list li:last-child { border-bottom: none; }
  .srcmodal-list li::before { content: ""; position: absolute; left: 2px; top: 15px; width: 5px; height: 5px; border-radius: 50%; background: #0071e3; }
  .srcmodal-list a { color: #0071e3; text-decoration: none; word-break: break-all; }
  .srcmodal-list a:hover { text-decoration: underline; }
  .srcmodal-badge {
    display: inline-block; font-size: 15px; font-weight: 700; color: #1a5b30;
    background: #e7f7ed; border-radius: 5px; padding: 1px 6px; margin-left: 4px; vertical-align: middle;
  }
  .srcmodal-empty { color: #6e6e73; margin: 0 0 10px; }
  .srcmodal-link {
    display: inline-block; margin-top: 4px; color: #0071e3; text-decoration: none;
    font-weight: 600; border-bottom: 1px dashed #9cc1f0; padding-bottom: 1px;
  }
  .srcmodal-link:hover { border-bottom-color: #0071e3; }

  .footer-rotator {
    text-align: right; font-size: 15px; color: #a1a1a6;
    font-style: italic; letter-spacing: 0.2px; transition: opacity 0.6s ease;
  }
  .footer-rotator.fade { opacity: 0; }
  .footer-row {
    max-width: 860px; margin: 32px auto 0; padding: 16px 4px 0;
    display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
  }
  .version-badge {
    position: relative; text-align: left; flex-shrink: 0;
  }
  .vb-btn {
    appearance: none; border: 0; background: transparent; cursor: pointer;
    padding: 4px 6px; border-radius: 7px; font-size: 15px; color: #a1a1a6;
    font-family: "Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    letter-spacing: 0; white-space: nowrap; user-select: none; transition: color .15s, background .15s;
  }
  .vb-btn:hover { color: #1a1d21; background: #f0f4fa; }
  .vb-btn:focus-visible { outline: 2px solid #0071e3; outline-offset: 2px; }
  .vb-panel {
    position: absolute; bottom: calc(100% + 8px); left: 0;
    width: min(420px, calc(100vw - 48px));
    background: #fff; border: 1px solid #e6e9ee; border-radius: 14px;
    box-shadow: 0 14px 40px rgba(26,29,33,.14); padding: 8px; z-index: 60;
    opacity: 0; transform: translateY(6px); pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
  }
  .vb-panel.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .vb-head { display: flex; align-items: baseline; justify-content: space-between; padding: 10px 12px 8px; }
  .vb-head h4 { margin: 0; font-size: 15px; font-weight: 700; color: #1a1d21;
    font-family: "Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; letter-spacing: -0.1px; }
  .vb-head span { font-size: 15px; color: #a1a1a6; }
  .vb-panel ul { list-style: none; margin: 0; padding: 0;
    max-height: min(320px, 50vh); overflow-y: auto; overscroll-behavior: contain; }
  .vb-panel li { padding: 11px 12px; border-radius: 10px; border-left: 2px solid transparent; }
  .vb-panel li:hover { background: #f6f7f9; border-left-color: #0071e3; }
  .vb-panel li + li { margin-top: 2px; }
  .vb-time { font-size: 15px; color: #a1a1a6; font-variant-numeric: tabular-nums;
    letter-spacing: 0.2px; margin-bottom: 3px; }
  .vb-desc { font-size: 15px; line-height: 1.5; color: #1a1d21;
    font-family: "Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; letter-spacing: -0.1px; }
  @media (prefers-reduced-motion: reduce) { .vb-panel { transition: none; } }
  .test-badge {
    max-width: 860px;
    margin: 0 auto 16px;
    padding: 0 4px;
    text-align: left;
  }
  .test-badge span {
    display: inline-block;
    font-size: 15px;
    font-weight: 700;
    color: #1d1d1f;
    background: #ffc107;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 0.6px;
    user-select: none;
  }
  /* ===== 아이디어 뱅크 ===== */
  .wrap + .wrap { margin-top: 20px; }
  .bank-wrap .bank-head { margin-top: 0; }
  .bank { }
  .bank-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .bank-title { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  .bank-wip { font-size: 12px; font-weight: 700; color: #6e6e73; background: #f0f0f2; border: 1px solid #e3e3e8; border-radius: 6px; padding: 3px 8px; display: inline-flex; align-items: center; gap: 5px; letter-spacing: .2px; }
  .bank-wip::before { content:""; width:5px; height:5px; border-radius:50%; background:#0071e3; }
  .bank-count { font-size: 14px; color: #86868b; }
  .bank-actions { margin-left: auto; display: flex; gap: 6px; }
  .bank-exp { font-size: 13px; font-weight: 600; color: #6e6e73; background: #f5f5f7; border: 1px solid #e8e8ed; border-radius: 7px; padding: 6px 11px; cursor: pointer; font-family: inherit; transition: .15s; }
  .bank-exp:hover { border-color: #0071e3; color: #0071e3; }
  .bank-desc { font-size: 14px; color: #86868b; margin-top: 8px; line-height: 1.6; }

  .bank-search { position: relative; margin: 16px 0 12px; }
  .bank-search input { width: 100%; font-family: inherit; font-size: 15px; color: #1d1d1f; background: #f5f5f7; border: 1px solid #e8e8ed; border-radius: 10px; padding: 12px 14px 12px 40px; transition: .15s; }
  .bank-search input::placeholder { color: #a1a1a6; }
  .bank-search input:focus { outline: none; border-color: #0071e3; background: #fff; }
  .bank-search .bs-ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #a1a1a6; pointer-events: none; }

  .bank-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .bf-chip { font-family: inherit; font-size: 14px; font-weight: 600; color: #6e6e73; background: #f0f0f2; border: none; border-radius: 999px; padding: 7px 14px; cursor: pointer; transition: .15s; }
  .bf-chip:hover:not(.on) { background: #e8e8ed; }
  .bf-chip.on { background: #eaf4ff; color: #0071e3; }

  .bank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .bank-grid { grid-template-columns: 1fr; } }

  .bcard { position: relative; background: #fff; border: 1px solid #e8e8ed; border-radius: 14px; padding: 16px 16px 14px; transition: .15s; display: flex; flex-direction: column; }
  .bcard:hover { border-color: #0071e3; box-shadow: 0 4px 18px rgba(0,113,227,.10); }
  .bcard:hover .bc-del { opacity: 1; }
  .bc-top { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; }
  .bc-badge { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 6px; background: #eaf4ff; color: #0071e3; }
  .bc-badge.profit { background: #f0f0f2; color: #6e6e73; }
  .bc-tag-topic { font-size: 11.5px; font-weight: 600; color: #86868b; }
  .bc-title { font-size: 14.5px; font-weight: 700; line-height: 1.45; margin-bottom: 9px; }
  .bc-bl { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 5px; }
  .bc-bl li { font-size: 12.5px; color: #6e6e73; line-height: 1.6; padding-left: 12px; position: relative; }
  .bc-bl li::before { content:""; position:absolute; left:2px; top:8px; width:3px; height:3px; border-radius:50%; background:#0071e3; opacity:.5; }

  .bc-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 11px; }
  .bc-tag { font-size: 11.5px; font-weight: 500; color: #6e6e73; background: #f5f5f7; border: 1px solid #e8e8ed; border-radius: 6px; padding: 2px 7px; display: inline-flex; align-items: center; gap: 4px; }

  .bank-empty.hide { display: none; }
  .bank-grid.hide { display: none; }

  /* 결과 카드 → 뱅크 저장 버튼 */
  .idea-card { position: relative; }
  .idea-actions { position: absolute; top: 14px; right: 16px; display: flex; gap: 5px; }
  .idea-act { display: inline-flex; align-items: center; gap: 4px; font-size: 12.5px; font-weight: 600; color: #0071e3; background: #eaf4ff; border: none; border-radius: 7px; padding: 5px 8px; cursor: pointer; font-family: inherit; white-space: nowrap; transition: .15s; }
  .idea-act:hover { background: #d8ecff; }

  /* 좁은 화면 — 카드 버튼은 아이콘만 노출해 제목 폭 확보 */

  /* 토스트 */

<script>
const TOPIC_LABEL = { consumer: "소비자", tech: "기술", rival: "경쟁사" };
const SRC_LABEL = { mi:"Market Sensing", "2030":"2030 미래 전망", reports:"클로드 작성 워드보고서", search:"웹 검색" };
const DIR_LABEL = { sales: "매출 확대", profit: "수익성 강화" };

const selectedTopics = new Set(["consumer", "tech", "rival"]);
const selectedSources = new Set(["mi", "2030", "reports", "search"]);
let ideaCount = 3;
const selectedDirections = new Set(["sales"]);
let lastSources = { reportSources: null, searchSources: [], miSources: [], trendSources: [] };
let lastIdeas = [];
let lastDirForSave = "sales";
let citationMode = false;  // LLM이 아이디어별 인용 ID를 제공하면 true → 근거를 아이디어별로 표시

document.querySelectorAll("#topicRow .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const t = chip.dataset.topic;
    if (selectedTopics.has(t)) {
      if (selectedTopics.size === 1) return;
      selectedTopics.delete(t); chip.classList.remove("active");
    } else { selectedTopics.add(t); chip.classList.add("active"); }
  });
});

document.querySelectorAll("#sourceRow .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const s = chip.dataset.src;
    if (selectedSources.has(s)) { selectedSources.delete(s); chip.classList.remove("active"); }
    else { selectedSources.add(s); chip.classList.add("active"); }
  });
});

const countDisplay = document.getElementById("countDisplay");
document.querySelectorAll(".page-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    ideaCount = Math.max(1, Math.min(8, ideaCount + parseInt(btn.dataset.delta)));
    countDisplay.textContent = ideaCount;
  });
});

document.querySelectorAll(".mode-card").forEach(card => {
  card.addEventListener("click", () => {
    const d = card.dataset.dir;
    if (selectedDirections.has(d)) {
      if (selectedDirections.size === 1) return;
      selectedDirections.delete(d); card.classList.remove("active");
    } else { selectedDirections.add(d); card.classList.add("active"); }
  });
});

const form = document.getElementById("form");
const btn = document.getElementById("submit-btn");
const status = document.getElementById("status");
const resultsHead = document.getElementById("resultsHead");
const resultsBody = document.getElementById("resultsBody");
const resultsMeta = document.getElementById("resultsMeta");
const reportNote = document.getElementById("reportNote");

function fmtElapsed(s) { return s < 60 ? `${s}초` : `${Math.floor(s/60)}분 ${s%60}초`; }
function pillTag(s, idx) {
  const ds = idx == null ? "" : ` data-idea="${idx}"`;
  return `<span class="pill src-pill" data-src="${s}"${ds} role="button" tabindex="0" title="참고 자료 보기">${SRC_LABEL[s]}</span>`;
}
function srcPills(idea, idx) {
  if (!citationMode) return [...selectedSources].map(s => pillTag(s, null)).join("");
  const ids = (idea && Array.isArray(idea.sources)) ? idea.sources : [];
  const types = [];
  if (ids.some(id => /^M/.test(id))) types.push("mi");
  if (ids.some(id => /^T/.test(id))) types.push("2030");
  if (ids.some(id => /^R/.test(id))) types.push("reports");
  // 웹 검색은 호출 단위라 아이디어별 분리가 불가 — 선택·인용기사 있으면 전체로 노출
  if (selectedSources.has("search") && (lastSources.searchSources || []).length) types.push("search");
  if (!types.length) return `<span class="pill pill-none">직접 인용한 소스 없음</span>`;
  return types.map(s => pillTag(s, idx)).join("");
}
function esc(str){ return String(str==null?"":str).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function inline(str){ // <b>만 허용
  return esc(str).replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>");
}
function toArr(v){ return Array.isArray(v) ? v : (v == null || v === "" ? [] : [v]); }
function bullets(v){
  const arr = toArr(v).map(s => String(s == null ? "" : s).trim()).filter(Boolean).slice(0, 3);
  if (!arr.length) return "";
  return `<ul class="bl">` + arr.map(s => `<li>${inline(s)}</li>`).join("") + `</ul>`;
}

function renderReportNote(rs, reportsSelected) {
  if (!reportsSelected) { reportNote.innerHTML = ""; return; }
  if (!rs) {
    reportNote.innerHTML = `<div class="rn-fail">업로드 보고서를 불러오지 못했습니다 (R2 바인딩 확인 필요).</div>`;
    return;
  }
  const exc = Array.isArray(rs.excerpted) ? rs.excerpted : [];
  const total = rs.total || 0;
  const inner = exc.length
    ? `<div class="rn-sub">Claude가 본문까지 읽은 보고서 ${exc.length}건</div>`
      + `<div class="rn-chips">${exc.map(t => `<span>${esc(t)}</span>`).join("")}</div>`
    : `<div class="rn-sub">본문 발췌 가능한 docx가 없어 제목 목록만 제공되었습니다.</div>`;
  const more = total > exc.length
    ? `<div class="rn-note">제목 목록으로는 전체 ${total}건이 함께 제공되었습니다.</div>` : "";
  reportNote.innerHTML =
    `<details><summary>📎 참고한 업로드 보고서 · 본문 ${exc.length}건 / 전체 ${total}건</summary>`
    + `<div class="rn-body">${inner}${more}</div></details>`;
}

function render(ideas) {
  resultsBody.innerHTML = "";
  ideas.forEach((idea, n) => {
    const topic = TOPIC_LABEL[idea.topic] ? idea.topic : [...selectedTopics][0];
    const otRow = (toArr(idea.opportunity).length || toArr(idea.threat).length)
      ? `<div class="idea-ot">
          <div class="otbox opp"><div class="fl">당사 기회</div>${bullets(idea.opportunity)}</div>
          <div class="otbox thr"><div class="fl">당사 위협</div>${bullets(idea.threat)}</div>
        </div>` : "";
    const angle = toArr(idea.angle).length
      ? `<div class="idea-angle"><div class="fl">보고서 방향</div>${bullets(idea.angle)}</div>` : "";
    const card = document.createElement("div");
    card.className = "idea-card";
    card.style.animationDelay = (n * 0.07) + "s";
    card.innerHTML = `
      <div class="idea-actions">
        <button type="button" class="idea-act idea-copy" data-idx="${n}" title="복사" aria-label="복사"><svg class="idea-act-ico" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span class="lbl">복사</span></button>
        <button type="button" class="idea-act idea-save" data-idx="${n}" title="저장" aria-label="저장"><svg class="idea-act-ico" viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg><span class="lbl">저장</span></button>
      </div>
      <div class="idea-top">
        <div class="idea-num">${n + 1}</div>
        <div>
          <span class="idea-title">${esc(idea.title)}</span>

function cardToText(c, i) {
  const title = c.querySelector(".idea-title").textContent.trim();
  const tag = c.querySelector(".idea-tag").textContent.trim();
  const lines = sel => [...c.querySelectorAll(sel + " ul.bl li")].map(li => li.textContent.trim()).filter(Boolean);
  const sect = (label, arr) => arr.length ? `\n  [${label}]\n` + arr.map(s => `   - ${s}`).join("\n") : "";
  let out = `${i + 1}. [${tag}] ${title}`;
  out += sect("내용", lines(".idea-content"));
  out += sect("당사 기회", lines(".otbox.opp"));
  out += sect("당사 위협", lines(".otbox.thr"));
  out += sect("보고서 방향", lines(".idea-angle"));
  return out;
}

async function loadBank() {
  try {
    const res = await fetch("/api/bank");

function renderBank() {
  const q = bankQuery.value.trim().toLowerCase();
  bankCount.textContent = bankData.length ? `${bankData.length}건` : "";
  const list = bankData.filter(x => {
    if (bankFilter !== "all" && x.dir !== bankFilter) return false;
    if (!q) return true;
    const hay = [x.title, (x.content||[]).join(" "), (x.opportunity||[]).join(" "),
      (x.threat||[]).join(" "), (x.angle||[]).join(" "), x.memo||"", (x.tags||[]).join(" ")]
      .join(" ").toLowerCase();
    return hay.includes(q);
  });

  if (!list.length) {
    bankGrid.innerHTML = ""; bankGrid.classList.add("hide");
    bankEmpty.classList.remove("hide");
    bankEmpty.innerHTML = bankData.length
      ? "<b>결과가 없습니다</b>검색어나 필터를 바꿔보세요."
      : "<b>아직 저장된 아이디어가 없습니다</b>위 자판기에서 아이디어를 뽑고 ‘🔖 저장’을 눌러보세요.";
    return;
  }
  bankEmpty.classList.add("hide");
  bankGrid.classList.remove("hide");
  bankGrid.innerHTML = list.map(x => {
    const topic = TOPIC_LABEL[x.topic] || "";
    const bl = (x.content || []).slice(0, 3).map(b => `<li>${inline(b)}</li>`).join("");
    const tags = (x.tags || []).map(t =>
      `<span class="bc-tag">#${esc(t)}<span class="x" data-act="untag" data-id="${x.id}" data-tag="${esc(t)}">×</span></span>`).join("");
    const memo = x.memo
      ? `<div class="bc-memo" data-act="memo" data-id="${x.id}">${esc(x.memo)}</div>`
      : `<div class="bc-memo empty" data-act="memo" data-id="${x.id}">+ 메모 추가</div>`;
    const author = x.author ? `<span class="bc-who"><span class="bc-avatar">${esc(x.author[0])}</span>${esc(x.author)}</span>` : "";
    return `
      <div class="bcard" data-id="${x.id}">
        <button type="button" class="bc-del" title="삭제" data-act="del" data-id="${x.id}">×</button>
        <div class="bc-top">
          <span class="bc-badge ${x.dir==='profit'?'profit':''}">${DIR_BADGE[x.dir]||""}</span>
          ${topic?`<span class="bc-tag-topic">${esc(topic)}</span>`:""}
        </div>

        ${bl?`<ul class="bc-bl">${bl}</ul>`:""}
        <div class="bc-tags">${tags}<span class="bc-tag-add" data-act="addtag" data-id="${x.id}">+ 태그</span></div>
        ${memo}
        <div class="bc-meta">저장 ${esc(x.date||"")}${author}</div>
      </div>`;
  }).join("");
}

bankGrid.addEventListener("click", async (e) => {
  const t = e.target.closest("[data-act]");
  if (!t) {
    const card = e.target.closest(".bcard");
    if (card) openBankDetail(card.dataset.id);
    return;
  }
  const act = t.dataset.act, id = t.dataset.id;
  if (act === "del") {
    if (!confirm("이 아이디어를 뱅크에서 삭제할까요?")) return;
    try {
      const res = await fetch("/api/bank?id=" + encodeURIComponent(id), { method: "DELETE" });
      if (!res.ok) throw new Error();
      bankData = bankData.filter(x => x.id !== id); renderBank();
    } catch { bankToast("삭제 실패"); }
  } else if (act === "untag") {
    const rec = bankData.find(x => x.id === id); if (!rec) return;
    const tags = (rec.tags || []).filter(v => v !== t.dataset.tag);
    await bankPut(id, { tags });
  } else if (act === "addtag") {
    const v = prompt("태그 입력"); if (!v) return;
    const rec = bankData.find(x => x.id === id); if (!rec) return;
    const tags = [...(rec.tags || [])]; const nt = v.trim();
    if (nt && !tags.includes(nt)) tags.push(nt);
    await bankPut(id, { tags });
  } else if (act === "memo") {
    if (t.querySelector("textarea")) return;
    const rec = bankData.find(x => x.id === id); if (!rec) return;
    t.classList.remove("empty");
    t.innerHTML = `<textarea>${rec.memo ? esc(rec.memo) : ""}</textarea>`;
    const ta = t.querySelector("textarea"); ta.focus();
    ta.value = rec.memo || "";
    ta.addEventListener("blur", async () => { await bankPut(id, { memo: ta.value.trim() }); }, { once: true });
  }
});

async function bankPut(id, patch) {
  try {
    const res = await fetch("/api/bank", {
      method: "PUT", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id, ...patch }),
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const i = bankData.findIndex(x => x.id === id);
    if (i !== -1 && data.item) bankData[i] = data.item;
    renderBank();
  } catch { bankToast("수정 실패"); renderBank(); }
}

function openSourceModal(src, ideaIdx) {
  // citationMode + 유효 아이디어일 때만 아이디어별 인용 ID로 필터
  const idea = (citationMode && ideaIdx != null && lastIdeas[ideaIdx]) ? lastIdeas[ideaIdx] : null;
  const ideaIds = idea && Array.isArray(idea.sources) ? idea.sources : null;
  const titleSuffix = idea ? ` · ${esc(idea.title).slice(0, 24)}…` : "";
  let html = "";
  if (src === "search") {
    const list = lastSources.searchSources || [];
    html = list.length
      ? `<ul class="srcmodal-list">` + list.map(s =>
          `<li><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a></li>`).join("") + `</ul>`
      : `<p class="srcmodal-empty">이번 생성에서는 웹 검색으로 인용한 기사가 없습니다.</p>`;
  } else if (src === "reports") {
    const rs = lastSources.reportSources;
    const items = rs && Array.isArray(rs.items) ? rs.items : [];
    if (ideaIds) {
      const cited = items.filter(it => ideaIds.includes(it.id));
      html = cited.length
        ? `<p class="srcmodal-empty">이 아이디어가 근거로 삼은 보고서 ${cited.length}건입니다.</p>`
          + `<ul class="srcmodal-list">` + cited.map(it =>
            `<li>${esc(it.title)} <span class="srcmodal-badge">본문 참고</span></li>`).join("") + `</ul>`
        : `<p class="srcmodal-empty">이 아이디어가 직접 인용한 업로드 보고서가 없습니다.</p>`;
    } else {
      const cat = rs && Array.isArray(rs.catalog) ? rs.catalog : [];
      const rel = rs && Array.isArray(rs.related) ? rs.related : [];
      const exc = new Set((rs && rs.excerpted) || []);
      const total = (rs && rs.total) || cat.length;
      let show = [...new Set(rel.length ? rel : [...exc])];
      if (show.length) {
        const head = rel.length
          ? `<p class="srcmodal-empty">이번 주제·키워드와 관련된 보고서 ${show.length}건입니다(전체 ${total}건 중).</p>`
          : `<p class="srcmodal-empty">Claude가 본문까지 읽은 보고서 ${show.length}건입니다(전체 ${total}건 중).</p>`;
        html = head + `<ul class="srcmodal-list">` + show.map(t =>
          `<li>${esc(t)}${exc.has(t) ? ` <span class="srcmodal-badge">본문 참고</span>` : ""}</li>`).join("") + `</ul>`;
      } else if (cat.length) {
        html = `<p class="srcmodal-empty">이번 생성에서는 본문까지 참고한 보고서가 없습니다(전체 ${total}건).</p>`;
      } else {
        html = `<p class="srcmodal-empty">참고한 업로드 보고서 정보가 없습니다.</p>`;
      }
    }
  } else if (src === "mi") {
    let list = lastSources.miSources || [];
    if (ideaIds) list = list.filter(s => ideaIds.includes(s.id));
    const boardLink = `<a class="srcmodal-link" href="https://mi.samsungda.net" target="_blank" rel="noopener">→ Market Sensing 보드 열기</a>`;
    const emptyMsg = ideaIds
      ? `이 아이디어가 직접 인용한 Market Sensing 신호가 없습니다.`
      : `이번 생성에서 참고한 Market Sensing 신호가 없습니다.`;
    html = (list.length
      ? (ideaIds ? `<p class="srcmodal-empty">이 아이디어가 근거로 삼은 신호 ${list.length}건입니다.</p>` : ``)
        + `<ul class="srcmodal-list">` + list.map(s => {
          const tag = s.lens || "";  // 등급(긴급/주시 등)은 판단 근거가 약해 미표시 — 렌즈만
          return `<li><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a>`
            + (tag ? ` <span class="srcmodal-badge">${esc(tag)}</span>` : "") + `</li>`;
        }).join("") + `</ul>`
      : `<p class="srcmodal-empty">${emptyMsg}</p>`) + boardLink;
  } else if (src === "2030") {
    let list = lastSources.trendSources || [];
    if (ideaIds) list = list.filter(s => ideaIds.includes(s.id));
    const boardLink = `<a class="srcmodal-link" href="https://2030.samsungda.net" target="_blank" rel="noopener">→ 2030 미래 전망 보드 열기</a>`;
    if (ideaIds) {
      html = (list.length
        ? `<p class="srcmodal-empty">이 아이디어와 연결된 메가트렌드입니다.</p>`
          + `<ul class="srcmodal-list">` + list.map(s => `<li>${esc(s.title)}</li>`).join("") + `</ul>`
        : `<p class="srcmodal-empty">이 아이디어가 직접 인용한 메가트렌드가 없습니다.</p>`) + boardLink;
    } else {
      const rel2030 = list.some(s => s && s.related);
      const lead = rel2030
        ? `이번 주제·키워드와 관련된 메가트렌드만 근거 맥락으로 추렸습니다(개별 기사 아님).`
        : `2030 보드의 8대 메가트렌드 골격을 근거 맥락으로 활용했습니다(주제 특정 신호가 없어 전체 제공, 개별 기사 아님).`;
      html = (list.length
        ? `<p class="srcmodal-empty">${lead}</p>`
          + `<ul class="srcmodal-list">` + list.map(s => `<li>${esc(s.title)}</li>`).join("") + `</ul>`
        : `<p class="srcmodal-empty">2030 미래 전망 보드의 메가트렌드를 근거 맥락으로 활용했습니다.</p>`) + boardLink;
    }
  } else {
    html = `<p class="srcmodal-empty">참고 자료 정보가 없습니다.</p>`;
  }
  srcModalTitle.textContent = "근거 · " + (SRC_LABEL[src] || src) + titleSuffix;
  srcModalBody.innerHTML = html;
  srcModal.classList.add("show");
  srcModal.setAttribute("aria-hidden", "false");
}
function closeSourceModal() {
  srcModal.classList.remove("show");
  srcModal.setAttribute("aria-hidden", "true");
}
resultsBody.addEventListener("click", (e) => {
  const pill = e.target.closest(".src-pill");
  if (pill) openSourceModal(pill.dataset.src, pill.dataset.idea != null ? Number(pill.dataset.idea) : null);
});
resultsBody.addEventListener("keydown", (e) => {
  if ((e.key === "Enter" || e.key === " ") && e.target.classList && e.target.classList.contains("src-pill")) {
    e.preventDefault(); openSourceModal(e.target.dataset.src, e.target.dataset.idea != null ? Number(e.target.dataset.idea) : null);
  }
});
document.getElementById("srcModalClose").addEventListener("click", closeSourceModal);
srcModal.addEventListener("click", (e) => { if (e.target === srcModal) closeSourceModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSourceModal(); });
</script>
</body>
</html>
