<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이디어 자판기</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", Roboto, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 40px 20px;
    color: #1d1d1f;
  }
  .wrap {
    max-width: 640px;
    position: relative;
    margin: 0 auto;
    background: #fff;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 8px 30px rgba(0,0,0,0.06);
  }
  h1 { font-size: 23px; margin: 0 0 12px; letter-spacing: -0.5px; text-align: center; padding-bottom: 16px; border-bottom: 1px solid #e8e8ed; }
  p.lead { color: #6e6e73; font-size: 13px; margin: 0 0 8px; line-height: 1.6; text-align: center; }
  label { display: block; font-size: 15px; font-weight: 700; margin: 32px 0 10px; color: #1d1d1f; }
  .sublabel { font-size: 12px; color: #86868b; font-weight: 400; margin-left: 4px; }

  /* 도구모음 런처 */
  .da-launcher{position:absolute;top:16px;right:16px;z-index:50;display:inline-flex;align-items:center;gap:6px;height:29px;padding:0 9px;border:1.5px solid #e6e9ee;border-radius:7px;background:#fff;text-decoration:none;color:#1a1d21;font-family:'Pretendard',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:12px;font-weight:600;line-height:1;transition:.15s}
  .da-launcher:hover{border-color:#0071e3;box-shadow:0 4px 18px rgba(0,113,227,.12)}
  .da-launcher .da-gi{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:18px;height:18px}
  .da-launcher .da-gi i{background:#5b6470;border-radius:1px;transition:.15s}
  .da-launcher:hover .da-gi i{background:#0071e3}

  /* 토글 칩 */
  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    flex: 1; min-width: 0; padding: 10px 8px; border: none; background: #f0f0f2; border-radius: 8px;
    cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: #1d1d1f;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px;
    height: 40px; -webkit-tap-highlight-color: transparent;
  }
  .chip:hover:not(.active) { background: #e8e8ed; }
  .chip.active { background: #eaf4ff; color: #0071e3; }
  .chip .em { font-size: 15px; }
  .source-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .source-grid .chip { flex: none; }
  @media (max-width: 520px) { .source-grid { grid-template-columns: 1fr 1fr; } }

  /* 갯수 카운터 */
  .page-row { display: flex; gap: 8px; align-items: stretch; }
  .page-btn {
    width: 44px; height: 40px; border: none; background: #f0f0f2; color: #1d1d1f;
    font-weight: 700; font-size: 18px; cursor: pointer; font-family: inherit;
    border-radius: 8px; transition: all 0.15s; display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover { background: #e8e8ed; }
  .page-display {
    flex: 1; border: none; background: #eaf4ff; color: #0071e3; padding: 8px;
    text-align: center; font-size: 15px; font-weight: 700; border-radius: 8px;
    user-select: none; height: 40px; display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .page-display .unit { font-size: 12px; font-weight: 600; opacity: .75; }

  /* 처리 모드 */
  .mode-row { display: flex; gap: 8px; }
  .mode-card {
    flex: 1; padding: 10px 8px; border: none; background: #f0f0f2; border-radius: 8px;
    cursor: pointer; transition: all 0.15s; font-family: inherit; color: #1d1d1f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; line-height: 1.3; min-height: 52px;
  }
  .mode-card:hover:not(.active) { background: #e8e8ed; }
  .mode-card.active { background: #eaf4ff; }
  .mode-name { font-size: 13px; font-weight: 800; letter-spacing: 0.3px; }
  .mode-card.active .mode-name { color: #0071e3; }
  .mode-sub { font-size: 11px; color: #86868b; }

  /* 신규 검색 입력 */
  .search-input-wrap { margin-top: 8px; display: none; }
  .search-input-wrap.show { display: block; }
  .search-input-wrap input {
    width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px;
    font-size: 14px; font-family: inherit; background: #fff;
  }
  .hint { font-size: 12px; color: #86868b; margin-top: 6px; }

  /* 생성 버튼 */
  button.submit-btn {
    width: 100%; margin-top: 32px; padding: 16px; background: #0071e3; color: #fff;
    border: 0; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; position: relative; overflow: hidden; height: 52px;
    display: flex; align-items: center; justify-content: center;
  }
  button.submit-btn:hover:not(:disabled) { background: #0077ed; }
  button.submit-btn:disabled { background: #aacdef; cursor: not-allowed; }
  button.submit-btn:disabled::after {
    content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%);
    animation: skeleton-wave 2.5s infinite;
  }
  @keyframes skeleton-wave { 0% { left: -60%; } 100% { left: 110%; } }

  .status {
    margin-top: 20px; padding: 14px; border-radius: 10px; font-size: 13px; line-height: 1.5;
    display: none; white-space: pre-wrap;
  }
  .status.info { background: #eaf4ff; color: #003c80; display: block; }
  .status.error { background: #ffeaea; color: #8a0000; display: block; }
  .status.success { background: #e7f7ed; color: #1a5b30; display: block; }

  /* 결과 */
  .results { margin-top: 28px; }
  .results-head {
    display: none; align-items: center; justify-content: space-between;
    padding-bottom: 12px; margin-bottom: 16px; border-bottom: 1px solid #e8e8ed;
  }
  .results-head.show { display: flex; }
  .results-head .rtitle { font-size: 15px; font-weight: 700; }
  .results-head .rmeta { font-size: 12px; color: #86868b; margin-top: 2px; }
  .copy-all {
    font-size: 12px; font-weight: 600; color: #0071e3; background: #eaf4ff;
    border: none; border-radius: 7px; padding: 6px 12px; cursor: pointer; font-family: inherit;
  }
  .copy-all:hover { background: #d8ecff; }

  /* 참고한 업로드 보고서 */
  .report-note { margin-bottom: 14px; }
  .report-note details { background:#f5f8ff; border:1px solid #dbe7fb; border-radius:10px; }
  .report-note summary { cursor:pointer; list-style:none; padding:10px 14px; font-size:12.5px; font-weight:700; color:#0071e3; }
  .report-note summary::-webkit-details-marker { display:none; }
  .report-note summary::after { content:" ▾"; color:#7aa7e6; }
  .report-note details[open] summary::after { content:" ▴"; }
  .report-note .rn-body { padding:0 14px 12px; }
  .report-note .rn-sub { font-size:11px; color:#6e6e73; margin:2px 0 8px; }
  .report-note .rn-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .report-note .rn-chips span { font-size:11.5px; color:#1d1d1f; background:#fff; border:1px solid #dbe7fb; border-radius:6px; padding:3px 8px; line-height:1.4; }
  .report-note .rn-note { font-size:11px; color:#a1a1a6; margin-top:8px; }
  .report-note .rn-fail { font-size:11.5px; color:#8a6d00; background:#fff8e6; border:1px solid #ffe6a3; border-radius:8px; padding:8px 12px; }

  .idea-card {
    border: 1px solid #e8e8ed; border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
    background: #fff; opacity: 0; transform: translateY(8px); animation: dispense .4s ease forwards;
  }
  @keyframes dispense { to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) { .idea-card { animation: none; opacity: 1; transform: none; } }
  .idea-top { display: flex; align-items: flex-start; gap: 10px; }
  .idea-num {
    flex: none; width: 24px; height: 24px; border-radius: 7px; background: #0071e3; color: #fff;
    font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px;
  }
  .idea-title { font-size: 15px; font-weight: 700; line-height: 1.45; }
  .idea-tag {
    display: inline-block; font-size: 11px; font-weight: 700; color: #6e6e73; background: #f0f0f2;
    border-radius: 6px; padding: 2px 8px; margin-left: 8px; vertical-align: middle; letter-spacing: .2px;
  }
  /* 4필드 — 내용 / 당사 기회 / 당사 위협 / 보고서 방향 */
  .idea-content { margin-top: 12px; }
  .idea-content .fl, .idea-ot .fl, .idea-angle .fl {
    font-size: 11px; font-weight: 800; letter-spacing: .3px; margin-bottom: 4px;
  }
  .idea-content .fl { color: #86868b; }
  .idea-content .ft { font-size: 13.5px; color: #3a3a3c; line-height: 1.6; }
  .idea-content .ft b, .idea-ot .ft b { color: #1d1d1f; font-weight: 700; }

  .idea-ot { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .idea-ot .otbox { border-radius: 10px; padding: 10px 12px; }
  .idea-ot .otbox .ft { font-size: 13px; line-height: 1.55; }
  .idea-ot .opp { background: #effaf3; border: 1px solid #cdeed9; }
  .idea-ot .opp .fl { color: #1a7a42; }
  .idea-ot .thr { background: #fff1f1; border: 1px solid #f6d6d6; }
  .idea-ot .thr .fl { color: #b02a2a; }
  @media (max-width: 520px) { .idea-ot { grid-template-columns: 1fr; } }

  .idea-angle {
    margin-top: 12px; background: #eef5ff; border: 1px solid #d6e6fb;
    border-left: 3px solid #0071e3; border-radius: 10px; padding: 11px 13px;
  }
  .idea-angle .fl { color: #0071e3; }
  .idea-angle .ft { font-size: 13px; color: #2b3a4d; line-height: 1.6; }
  .idea-angle .ft b { color: #003c80; font-weight: 700; }
  .src-foot { margin-top: 12px; font-size: 11px; color: #a1a1a6; }
  .src-foot .pill { display:inline-block; background:#f5f5f7; border-radius:5px; padding:1px 7px; margin-right:4px; }

  /* 근거 출처 모달 */
  .src-pill { cursor: pointer; transition: all .12s; }
  .src-pill:hover { background: #e7f0ff; color: #0071e3; }
  .srcmodal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.32); display: none;
    align-items: center; justify-content: center; padding: 20px; z-index: 200;
  }
  .srcmodal-overlay.show { display: flex; }
  .srcmodal {
    background: #fff; border-radius: 16px; max-width: 440px; width: 100%;
    max-height: 78vh; display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,.22);
  }
  .srcmodal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid #e8e8ed; font-size: 14px; font-weight: 700; color: #1d1d1f;
  }
  .srcmodal-close {
    border: none; background: #f0f0f2; color: #6e6e73; width: 26px; height: 26px;
    border-radius: 7px; font-size: 17px; line-height: 1; cursor: pointer;
  }
  .srcmodal-close:hover { background: #e8e8ed; color: #1d1d1f; }
  .srcmodal-body { padding: 16px 18px; overflow-y: auto; font-size: 13px; color: #3a3a3c; line-height: 1.6; }
  .srcmodal-list { margin: 0; padding-left: 0; list-style: none; }
  .srcmodal-list li {
    padding: 9px 0 9px 16px; border-bottom: 1px solid #f2f2f4; position: relative;
  }
  .srcmodal-list li:last-child { border-bottom: none; }
  .srcmodal-list li::before { content: ""; position: absolute; left: 2px; top: 15px; width: 5px; height: 5px; border-radius: 50%; background: #0071e3; }
  .srcmodal-list a { color: #0071e3; text-decoration: none; word-break: break-all; }
  .srcmodal-list a:hover { text-decoration: underline; }
  .srcmodal-badge {
    display: inline-block; font-size: 10px; font-weight: 700; color: #1a5b30;
    background: #e7f7ed; border-radius: 5px; padding: 1px 6px; margin-left: 4px; vertical-align: middle;
  }
  .srcmodal-empty { color: #6e6e73; margin: 0 0 10px; }
  .srcmodal-link {
    display: inline-block; margin-top: 4px; color: #0071e3; text-decoration: none;
    font-weight: 600; border-bottom: 1px dashed #9cc1f0; padding-bottom: 1px;
  }
  .srcmodal-link:hover { border-bottom-color: #0071e3; }

  .footer-rotator {
    text-align: center; margin-top: 32px; padding: 16px 0; font-size: 12px; color: #a1a1a6;
    font-style: italic; letter-spacing: 0.2px; transition: opacity 0.6s ease;
  }
  .footer-rotator.fade { opacity: 0; }
  .version-badge {
    max-width: 640px; margin: 16px auto 0; padding: 0 4px; font-size: 11px; color: #a1a1a6;
    font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace; letter-spacing: 0.2px;
    user-select: none; text-align: left;
  }
  .test-badge {
    max-width: 640px;
    margin: 0 auto 16px;
    padding: 0 4px;
    text-align: left;
  }
  .test-badge span {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: #1d1d1f;
    background: #ffc107;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 0.6px;
    user-select: none;
  }
</style>
</head>
<body>
<div class="test-badge"><span>TEST VERSION</span></div>
<div class="wrap">
  <a class="da-launcher" href="https://samsungda.net" title="도구모음 열기">
    <span class="da-gi"><i></i><i></i><i></i><i></i></span>도구모음
  </a>

  <h1>💡 아이디어 자판기</h1>
  <p class="lead">보고서 주제, 30초 안에 뽑아드립니다.</p>

  <form id="form">
    <label>① 아이디어 방향</label>
    <div class="mode-row">
      <button type="button" class="mode-card active" data-dir="sales">
        <span class="mode-name">매출 확대</span>
        <span class="mode-sub">신사업, 신규 제품·Biz 모델 아이디어</span>
      </button>
      <button type="button" class="mode-card" data-dir="profit">
        <span class="mode-name">수익성 강화</span>
        <span class="mode-sub">운영효율 증대 아이디어</span>
      </button>
    </div>

    <label>② 주제 선택 <span class="sublabel">복수 선택 가능</span></label>
    <div class="chip-row" id="topicRow">
      <button type="button" class="chip active" data-topic="consumer"><span class="em">🧑‍🤝‍🧑</span>소비자</button>
      <button type="button" class="chip active" data-topic="tech"><span class="em">⚙️</span>기술</button>
      <button type="button" class="chip active" data-topic="rival"><span class="em">🎯</span>경쟁사</button>
    </div>

    <label>③ 소스 <span class="sublabel">복수 선택 가능</span></label>
    <div class="source-grid" id="sourceRow">
      <button type="button" class="chip active" data-src="mi">Market Insight</button>
      <button type="button" class="chip active" data-src="2030">2030 미래트렌드</button>
      <button type="button" class="chip active" data-src="reports">업로드 보고서</button>
      <button type="button" class="chip" data-src="search">🔎 신규 검색</button>
    </div>
    <div class="search-input-wrap" id="searchWrap">
      <input type="text" id="searchKeyword" placeholder="검색 키워드 (예 : 북미 빌트인 냉장고 트렌드)">
      <div class="hint">선택 시 웹에서 최신 자료를 추가로 수집해 근거에 반영합니다.</div>
    </div>

    <label>④ 아이디어 갯수</label>
    <div class="page-row">
      <button type="button" class="page-btn" data-delta="-1">−</button>
      <div class="page-display"><span id="countDisplay">3</span><span class="unit">개</span></div>
      <button type="button" class="page-btn" data-delta="1">+</button>
    </div>

    <button type="submit" id="submit-btn" class="submit-btn">아이디어 생성</button>
  </form>

  <div id="status" class="status"></div>

  <div class="results">
    <div class="results-head" id="resultsHead">
      <div>
        <div class="rtitle">생성된 보고 주제</div>
        <div class="rmeta" id="resultsMeta"></div>
      </div>
      <button type="button" class="copy-all" id="copyAll">전체 복사</button>
    </div>
    <div id="reportNote" class="report-note"></div>
    <div id="resultsBody"></div>
  </div>

  <div class="footer-rotator" id="footerRotator">좋은 보고는 좋은 질문에서 시작됩니다.</div>
</div>

<div class="version-badge" id="versionBadge"></div>

<div class="srcmodal-overlay" id="srcModal" aria-hidden="true">
  <div class="srcmodal" role="dialog" aria-modal="true" aria-labelledby="srcModalTitle">
    <div class="srcmodal-head">
      <span id="srcModalTitle"></span>
      <button class="srcmodal-close" id="srcModalClose" aria-label="닫기">×</button>
    </div>
    <div class="srcmodal-body" id="srcModalBody"></div>
  </div>
</div>

<script>
const TOPIC_LABEL = { consumer: "소비자", tech: "기술", rival: "경쟁사" };
const SRC_LABEL = { mi:"Market Insight", "2030":"2030 미래트렌드", reports:"업로드 보고서", search:"신규 검색" };
const DIR_LABEL = { sales: "매출 확대", profit: "수익성 강화" };

const selectedTopics = new Set(["consumer", "tech", "rival"]);
const selectedSources = new Set(["mi", "2030", "reports"]);
let ideaCount = 3;
let direction = "sales";
let lastSources = { reportSources: null, searchSources: [] };

document.querySelectorAll("#topicRow .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const t = chip.dataset.topic;
    if (selectedTopics.has(t)) {
      if (selectedTopics.size === 1) return;
      selectedTopics.delete(t); chip.classList.remove("active");
    } else { selectedTopics.add(t); chip.classList.add("active"); }
  });
});

document.querySelectorAll("#sourceRow .chip").forEach(chip => {
  chip.addEventListener("click", () => {
    const s = chip.dataset.src;
    if (selectedSources.has(s)) { selectedSources.delete(s); chip.classList.remove("active"); }
    else { selectedSources.add(s); chip.classList.add("active"); }
    document.getElementById("searchWrap").classList.toggle("show", selectedSources.has("search"));
  });
});

const countDisplay = document.getElementById("countDisplay");
document.querySelectorAll(".page-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    ideaCount = Math.max(1, Math.min(8, ideaCount + parseInt(btn.dataset.delta)));
    countDisplay.textContent = ideaCount;
  });
});

document.querySelectorAll(".mode-card").forEach(card => {
  card.addEventListener("click", () => {
    direction = card.dataset.dir;
    document.querySelectorAll(".mode-card").forEach(c => c.classList.toggle("active", c === card));
  });
});

const form = document.getElementById("form");
const btn = document.getElementById("submit-btn");
const status = document.getElementById("status");
const resultsHead = document.getElementById("resultsHead");
const resultsBody = document.getElementById("resultsBody");
const resultsMeta = document.getElementById("resultsMeta");
const reportNote = document.getElementById("reportNote");

function fmtElapsed(s) { return s < 60 ? `${s}초` : `${Math.floor(s/60)}분 ${s%60}초`; }
function srcPills() { return [...selectedSources].map(s => `<span class="pill src-pill" data-src="${s}" role="button" tabindex="0" title="참고 자료 보기">${SRC_LABEL[s]}</span>`).join(""); }
function esc(str){ return String(str==null?"":str).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function inline(str){ // <b>만 허용
  return esc(str).replace(/&lt;b&gt;/g,"<b>").replace(/&lt;\/b&gt;/g,"</b>");
}

function renderReportNote(rs, reportsSelected) {
  if (!reportsSelected) { reportNote.innerHTML = ""; return; }
  if (!rs) {
    reportNote.innerHTML = `<div class="rn-fail">업로드 보고서를 불러오지 못했습니다 (R2 바인딩 확인 필요).</div>`;
    return;
  }
  const exc = Array.isArray(rs.excerpted) ? rs.excerpted : [];
  const total = rs.total || 0;
  const inner = exc.length
    ? `<div class="rn-sub">Claude가 본문까지 읽은 보고서 ${exc.length}건</div>`
      + `<div class="rn-chips">${exc.map(t => `<span>${esc(t)}</span>`).join("")}</div>`
    : `<div class="rn-sub">본문 발췌 가능한 docx가 없어 제목 목록만 제공되었습니다.</div>`;
  const more = total > exc.length
    ? `<div class="rn-note">제목 목록으로는 전체 ${total}건이 함께 제공되었습니다.</div>` : "";
  reportNote.innerHTML =
    `<details><summary>📎 참고한 업로드 보고서 · 본문 ${exc.length}건 / 전체 ${total}건</summary>`
    + `<div class="rn-body">${inner}${more}</div></details>`;
}

function render(ideas) {
  resultsBody.innerHTML = "";
  ideas.forEach((idea, n) => {
    const topic = TOPIC_LABEL[idea.topic] ? idea.topic : [...selectedTopics][0];
    const otRow = (idea.opportunity || idea.threat)
      ? `<div class="idea-ot">
          <div class="otbox opp"><div class="fl">당사 기회</div><div class="ft">${inline(idea.opportunity)}</div></div>
          <div class="otbox thr"><div class="fl">당사 위협</div><div class="ft">${inline(idea.threat)}</div></div>
        </div>` : "";
    const angle = idea.angle
      ? `<div class="idea-angle"><div class="fl">보고서 방향</div><div class="ft">${inline(idea.angle)}</div></div>` : "";
    const card = document.createElement("div");
    card.className = "idea-card";
    card.style.animationDelay = (n * 0.07) + "s";
    card.innerHTML = `
      <div class="idea-top">
        <div class="idea-num">${n + 1}</div>
        <div>
          <span class="idea-title">${esc(idea.title)}</span>
          <span class="idea-tag">${TOPIC_LABEL[topic]}</span>
        </div>
      </div>
      <div class="idea-content"><div class="fl">내용</div><div class="ft">${inline(idea.content)}</div></div>
      ${otRow}
      ${angle}
      <div class="src-foot">근거 : ${srcPills()}</div>`;
    resultsBody.appendChild(card);
  });
  resultsMeta.textContent = `${ideas.length}개 · ${DIR_LABEL[direction]} · 주제 ${[...selectedTopics].map(t=>TOPIC_LABEL[t]).join("·")}`;
  resultsHead.classList.add("show");
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = "생성中…";
  reportNote.innerHTML = "";
  status.className = "status info";
  const t0 = Date.now();
  const tick = setInterval(() => {
    status.textContent = `Claude로 아이디어 생성中… ⏱ ${fmtElapsed(Math.floor((Date.now()-t0)/1000))}`;
  }, 1000);
  status.textContent = "Claude로 아이디어 생성中… ⏱ 0초";

  const payload = {
    topics: [...selectedTopics],
    count: ideaCount,
    direction,
    sources: [...selectedSources],
    keyword: document.getElementById("searchKeyword").value.trim()
  };

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(t || `서버 오류 (${res.status})`);
    }
    const data = await res.json();
    const ideas = Array.isArray(data.ideas) ? data.ideas : [];
    if (!ideas.length) throw new Error("생성된 아이디어가 없습니다. 다시 시도해주세요.");

    clearInterval(tick);
    lastSources = { reportSources: data.reportSources || null, searchSources: data.searchSources || [] };
    render(ideas);
    renderReportNote(data.reportSources, selectedSources.has("reports"));
    status.className = "status success";
    status.textContent = `✓ ${ideas.length}개 생성 완료.`;
    resultsHead.scrollIntoView({ behavior: "smooth", block: "nearest" });
  } catch (err) {
    clearInterval(tick);
    status.className = "status error";
    status.textContent = "오류 : " + (err.message || err);
  } finally {
    btn.disabled = false;
    btn.textContent = "아이디어 생성";
  }
});

document.getElementById("copyAll").addEventListener("click", () => {
  const text = [...resultsBody.querySelectorAll(".idea-card")].map((c, i) => {
    const title = c.querySelector(".idea-title").textContent.trim();
    const tag = c.querySelector(".idea-tag").textContent.trim();
    const pick = sel => { const el = c.querySelector(sel); return el ? el.textContent.trim() : ""; };
    let out = `${i + 1}. [${tag}] ${title}`;
    out += `\n  - 내용 : ${pick(".idea-content .ft")}`;
    const opp = pick(".otbox.opp .ft"); if (opp) out += `\n  - 당사 기회 : ${opp}`;
    const thr = pick(".otbox.thr .ft"); if (thr) out += `\n  - 당사 위협 : ${thr}`;
    const ang = pick(".idea-angle .ft"); if (ang) out += `\n  - 보고서 방향 : ${ang}`;
    return out;
  }).join("\n\n");
  navigator.clipboard.writeText(text).then(() => {
    const b = document.getElementById("copyAll");
    b.textContent = "복사됨 ✓";
    setTimeout(() => b.textContent = "전체 복사", 1500);
  });
});

const footerMessages = [
  "좋은 보고는 좋은 질문에서 시작됩니다.",
  "현상 너머를 보는 눈 — 그것이 기획의 시작입니다.",
  "Beyond what is, toward what could be."
];
const footerEl = document.getElementById("footerRotator");
let fi = 0;
setInterval(() => {
  footerEl.classList.add("fade");
  setTimeout(() => { fi = (fi+1) % footerMessages.length; footerEl.textContent = footerMessages[fi]; footerEl.classList.remove("fade"); }, 600);
}, 6000);

fetch("/api/version").then(r => r.json()).then(d => {
  if (d && d.version) document.getElementById("versionBadge").textContent = "update : " + d.version;
}).catch(() => {});

// ===== 근거 출처 모달 =====
const srcModal = document.getElementById("srcModal");
const srcModalTitle = document.getElementById("srcModalTitle");
const srcModalBody = document.getElementById("srcModalBody");

function openSourceModal(src) {
  let html = "";
  if (src === "search") {
    const list = lastSources.searchSources || [];
    html = list.length
      ? `<ul class="srcmodal-list">` + list.map(s =>
          `<li><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a></li>`).join("") + `</ul>`
      : `<p class="srcmodal-empty">이번 생성에서는 웹 검색으로 인용한 기사가 없습니다.</p>`;
  } else if (src === "reports") {
    const rs = lastSources.reportSources;
    const cat = rs && Array.isArray(rs.catalog) ? rs.catalog : [];
    if (cat.length) {
      const exc = new Set(rs.excerpted || []);
      html = `<ul class="srcmodal-list">` + cat.map(t =>
        `<li>${esc(t)}${exc.has(t) ? ` <span class="srcmodal-badge">본문 참고</span>` : ""}</li>`).join("") + `</ul>`;
    } else {
      html = `<p class="srcmodal-empty">참고한 업로드 보고서 정보가 없습니다.</p>`;
    }
  } else if (src === "mi") {
    html = `<p class="srcmodal-empty">Market Insight 보드에서 수집·분류된 최신 시장 신호를 근거 맥락으로 활용했습니다. 개별 기사 목록은 보드에서 확인하세요.</p>`
      + `<a class="srcmodal-link" href="https://mi.samsungda.net" target="_blank" rel="noopener">→ Market Insight 보드 열기</a>`;
  } else if (src === "2030") {
    html = `<p class="srcmodal-empty">2030 미래 트렌드 보드의 메가트렌드를 근거 맥락으로 활용했습니다. 상세 근거는 보드에서 확인하세요.</p>`
      + `<a class="srcmodal-link" href="https://2030.samsungda.net" target="_blank" rel="noopener">→ 2030 미래 트렌드 보드 열기</a>`;
  } else {
    html = `<p class="srcmodal-empty">참고 자료 정보가 없습니다.</p>`;
  }
  srcModalTitle.textContent = "근거 · " + (SRC_LABEL[src] || src);
  srcModalBody.innerHTML = html;
  srcModal.classList.add("show");
  srcModal.setAttribute("aria-hidden", "false");
}
function closeSourceModal() {
  srcModal.classList.remove("show");
  srcModal.setAttribute("aria-hidden", "true");
}
resultsBody.addEventListener("click", (e) => {
  const pill = e.target.closest(".src-pill");
  if (pill) openSourceModal(pill.dataset.src);
});
resultsBody.addEventListener("keydown", (e) => {
  if ((e.key === "Enter" || e.key === " ") && e.target.classList && e.target.classList.contains("src-pill")) {
    e.preventDefault(); openSourceModal(e.target.dataset.src);
  }
});
document.getElementById("srcModalClose").addEventListener("click", closeSourceModal);
srcModal.addEventListener("click", (e) => { if (e.target === srcModal) closeSourceModal(); });
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeSourceModal(); });
</script>
</body>
